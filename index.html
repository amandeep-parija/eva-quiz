<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EVAIQ</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1 class="title">EVAIQ – Train • Test • Improve</h1>

    <marquee class="dev-marquee" behavior="scroll" direction="left">
      🚀 Profile Identification is now live. Additional training modules are currently under development.
    </marquee>

    <!-- Section -->
    <div id="section-container" class="section-container">
      <button onclick="startQuiz('profile')">Profile Identification</button>
      <button onclick="startQuiz('mistake')">Mistake Identification</button>
      <button onclick="startQuiz('points')">Point Knowledge</button>
      <button onclick="startQuiz('visual')">Visualization Correction</button>
    </div>

    <!-- Quiz-->
    <div id="quiz-container" class="hidden">
      <h2 id="question"></h2>

      <img id="question-image" src="" alt="" />

      <div id="options" class="options"></div>

      <button id="next-btn">Next</button>
    </div>

    <!-- Result -->
    <div id="result-container" class="hidden">
      <h2 id="result-text"></h2>
      <button onclick="goHome()">Back to Home</button>
    </div>


    <div id="result-card" class="result-card hidden">
      <p id="result-message"></p>
      <button class="result-btn" onclick="closeResult()">OK</button>
    </div>

  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>

</body>
</html>
